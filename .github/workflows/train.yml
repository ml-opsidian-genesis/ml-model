name: Continuous Training (CT)

on:
  push:
    paths:
      - 'VERSION'
  workflow_dispatch: 

jobs:
  train-and-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install huggingface_hub

      - name: Train New Model
        run: python src/train.py

      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          VERSION_TAG=$(cat VERSION)
          echo "Uploading model version $VERSION_TAG..."
          python src/upload_model.py $VERSION_TAG
          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV

      - name: Update Dockerfile
        run: |
          # Use sed to dynamically update the model version inside the Docker container
          sed -i "s/ENV MODEL_VERSION=.*/ENV MODEL_VERSION=\"${{ env.VERSION_TAG }}\"/g" Dockerfile

      - name: Commit and Push Code Update
        run: |
          git config --global user.name "MLOps Bot"
          git config --global user.email "bot@mlops.com"
          git add Dockerfile
          git commit -m "🤖 Auto-update model to version ${{ env.VERSION_TAG }}"
          git push
